# This workflow will publish the package to NPM when commits are pushed to main
# It will only publish if the version in package.json has changed

name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
      current-version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      
      - name: Get current version
        id: get-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      
      - name: Check if version changed
        id: check
        run: |
          # Compare the actual version values rather than grepping the diff,
          # which also matches unchanged context lines near the version field.
          PREV=$(git show HEAD^:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" || echo "")
          CURR=$(node -p "require('./package.json').version")
          if [ "$PREV" != "$CURR" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed ($PREV -> $CURR), will publish to NPM"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged ($CURR), skipping NPM publish"
          fi

  publish-npm:
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: write
    steps:
      - uses: actions/checkout@v6
  
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build --if-present

      - name: Run Lint
        run: npm run lint

      - name: Run Test
        run: npm test

      - name: Publish to NPM
        run: npm publish
      
      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
